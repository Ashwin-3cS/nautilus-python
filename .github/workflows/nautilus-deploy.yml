# Generated by nautilus-cli init-ci (template: python)
name: Deploy Enclave (Python)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-enclave
  cancel-in-progress: true

env:
  APP_DIR: nautilus-app
  ENCLAVE_CPU: 2
  ENCLAVE_MEM: 4096

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy source to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TEE_EC2_HOST }}
          username: ${{ secrets.TEE_EC2_USER }}
          key: ${{ secrets.TEE_EC2_SSH_KEY }}
          source: "Containerfile,app.py,src,requirements.txt,Makefile"
          target: "~/nautilus-app/"
          overwrite: true
          rm: false

      - name: Install dependencies
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          ssh $SSH_OPTS -i /tmp/deploy_key "$EC2_USER@$EC2_HOST" 'bash -s' << 'REMOTE'
          set -e
          # Detect package manager (AL2023 uses dnf, AL2 uses yum/amazon-linux-extras)
          if command -v dnf &> /dev/null; then
            PKG="sudo dnf"
          else
            PKG="sudo yum"
          fi

          if ! command -v docker &> /dev/null; then
            $PKG install -y docker || (curl -fsSL https://get.docker.com | sudo sh)
            sudo systemctl start docker && sudo systemctl enable docker
            sudo usermod -aG docker $USER
          fi
          if ! command -v nitro-cli &> /dev/null; then
            $PKG install -y aws-nitro-enclaves-cli aws-nitro-enclaves-cli-devel
            sudo usermod -aG ne $USER
          fi
          command -v socat &> /dev/null || $PKG install -y socat
          command -v jq    &> /dev/null || $PKG install -y jq
          command -v make  &> /dev/null || $PKG install -y make
          echo "Dependencies ready"
          REMOTE
          rm -f /tmp/deploy_key

      - name: Configure enclave allocator
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          ssh $SSH_OPTS -i /tmp/deploy_key "$EC2_USER@$EC2_HOST" 'bash -s' << 'REMOTE'
          set -e
          ALLOC=/etc/nitro_enclaves/allocator.yaml
          sudo sed -i "s/memory_mib:.*/memory_mib: 4096/" "$ALLOC" || true
          sudo sed -i "s/cpu_count:.*/cpu_count: 2/"   "$ALLOC" || true
          sudo systemctl restart nitro-enclaves-allocator.service || true
          sudo systemctl enable  nitro-enclaves-allocator.service || true
          REMOTE
          rm -f /tmp/deploy_key

      - name: Build enclave image
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          ssh $SSH_OPTS -i /tmp/deploy_key "$EC2_USER@$EC2_HOST" 'bash -s' << 'REMOTE'
          set -e
          cd ~/nautilus-app && rm -rf out && mkdir -p out
          sudo make 2>&1 | tee out/build.log
          echo "--- PCR Measurements ---"
          cat out/nitro.pcrs || true
          REMOTE
          rm -f /tmp/deploy_key

      - name: Launch enclave and setup bridge
        env:
          EC2_HOST: ${{ secrets.TEE_EC2_HOST }}
          EC2_USER: ${{ secrets.TEE_EC2_USER }}
          EC2_KEY: ${{ secrets.TEE_EC2_SSH_KEY }}
        run: |
          echo "$EC2_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10"
          ssh $SSH_OPTS -i /tmp/deploy_key "$EC2_USER@$EC2_HOST" 'bash -s' << 'REMOTE'
          set -e

          # Terminate old enclave and stale processes
          sudo pkill -f "socat.*5000" 2>/dev/null || true
          sudo systemctl stop nautilus-bridge.service 2>/dev/null || true
          sudo systemctl stop nautilus-logs.service   2>/dev/null || true
          sudo nitro-cli terminate-enclave --all      || true
          sleep 2

          # Re-reserve CPUs after Docker build may have disrupted the pool
          sudo systemctl restart nitro-enclaves-allocator.service
          sleep 2

          # Launch enclave
          sudo nitro-cli run-enclave \
            --cpu-count 2 \
            --memory 4096 \
            --eif-path ~/nautilus-app/out/nitro.eif
          sleep 3

          # Get CID (retry up to 5 times)
          for i in 1 2 3 4 5; do
            CID=$(sudo nitro-cli describe-enclaves | jq -r '.[0].EnclaveCID // empty')
            STATE=$(sudo nitro-cli describe-enclaves | jq -r '.[0].State // empty')
            echo "Attempt $i: CID=$CID State=$STATE"
            [ -n "$CID" ] && break
            echo "Waiting for enclave CID... (attempt $i)"
            sleep 2
          done

          if [ -z "$CID" ]; then
            echo "ERROR: Enclave crashed. Checking dmesg for details:"
            sudo dmesg | tail -30
            exit 1
          fi

          # Kill any stale socat processes
          sudo pkill -f "socat.*5000" 2>/dev/null || true

          # Bridge wrapper resolves CID dynamically on each (re)start
          sudo tee /usr/local/bin/nautilus-bridge.sh > /dev/null <<'BRIDGEOF'
          #!/bin/bash
          CID=$(nitro-cli describe-enclaves | jq -r '.[0].EnclaveCID // empty')
          if [ -z "$CID" ]; then echo "No enclave running"; exit 1; fi
          echo "Bridging TCP:5000 <-> VSOCK:$CID:5000"
          exec /usr/bin/socat TCP-LISTEN:5000,reuseaddr,fork VSOCK-CONNECT:$CID:5000
          BRIDGEOF
          sudo chmod +x /usr/local/bin/nautilus-bridge.sh

          # Setup bridge service (TCP:5000 <-> VSOCK:5000)
          sudo tee /etc/systemd/system/nautilus-bridge.service > /dev/null <<EOF
          [Unit]
          Description=Nautilus VSOCK Bridge (TCP:5000 <-> VSOCK:5000)
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/nautilus-bridge.sh
          Restart=always
          RestartSec=2

          [Install]
          WantedBy=multi-user.target
          EOF

          # Setup log collector service
          sudo tee /etc/systemd/system/nautilus-logs.service > /dev/null <<EOF
          [Unit]
          Description=Nautilus Log Collector (VSOCK:5001)
          After=network.target

          [Service]
          ExecStart=/usr/bin/socat VSOCK-LISTEN:5001,fork,reuseaddr OPEN:/tmp/enclave.log,creat,append
          Restart=always
          RestartSec=2

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable --now nautilus-bridge.service nautilus-logs.service
          sleep 2
          sudo systemctl is-active nautilus-bridge.service
          echo "Bridge active: CID=$CID  TCP:5000 -> VSOCK:5000"
          REMOTE
          rm -f /tmp/deploy_key
